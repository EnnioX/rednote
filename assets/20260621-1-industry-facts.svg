<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070611"/><stop offset="0.55" stop-color="#120a25"/><stop offset="1" stop-color="#090713"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#b58c38"/><stop offset="0.5" stop-color="#f2df91"/><stop offset="1" stop-color="#b58c38"/></linearGradient>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <circle cx="80" cy="1340" r="230" fill="none" stroke="#d8bc63" stroke-opacity="0.06"/>
  <text x="90" y="112" font-family="'PingFang SC', sans-serif" font-size="24" fill="#8f80a5" letter-spacing="5">01 / INDUSTRY FACTS</text>
  <text x="90" y="220" font-family="'PingFang SC', sans-serif" font-size="68" font-weight="700" fill="#f1df91">已确认的产业事实</text>
  <rect x="90" y="266" width="150" height="4" rx="2" fill="url(#gold)"/>
  <text x="90" y="325" font-family="'PingFang SC', sans-serif" font-size="27" fill="#a99abb">低轨星座组网、可回收火箭、政策与资本三重共振</text>

  <g font-family="'PingFang SC', sans-serif">
    <!-- Card 1: 星座建设刚性需求 (expanded height) -->
    <rect x="90" y="390" width="420" height="350" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="130" y="450" font-size="22" fill="#d8bc63" letter-spacing="3">星座建设刚性需求</text>
    <text x="130" y="525" font-size="38" font-weight="700" fill="#f6e8b5">GW 13,000颗卫星</text>
    <text x="130" y="568" font-size="26" fill="#c6b9d4">ITU频谱期限：2029.9前</text>
    <text x="130" y="604" font-size="26" fill="#c6b9d4">需部署1,300颗最低要求</text>
    <line x1="130" y1="640" x2="470" y2="640" stroke="#5e4c75"/>
    <text x="130" y="680" font-size="26" fill="#b8a9c8">2026年发射首破100次</text>
    <text x="130" y="716" font-size="26" fill="#b8a9c8">年均需发射>270颗</text>

    <!-- Card 2: 可回收火箭元年 (expanded height) -->
    <rect x="570" y="390" width="420" height="350" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="610" y="450" font-size="22" fill="#d8bc63" letter-spacing="3">可回收火箭元年</text>
    <text x="610" y="525" font-size="38" font-weight="700" fill="#f6e8b5">发射成本降至1/5</text>
    <text x="610" y="568" font-size="26" fill="#c6b9d4">从5-15万→1万元/公斤</text>
    <line x1="610" y1="640" x2="950" y2="640" stroke="#5e4c75"/>
    <text x="610" y="680" font-size="26" fill="#b8a9c8">长征十号甲低空回收告捷</text>
    <text x="610" y="716" font-size="26" fill="#b8a9c8">朱雀三号/天龙三号H2首飞</text>

    <!-- Card 3: 政策升格 (original height) -->
    <rect x="90" y="780" width="420" height="290" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="130" y="840" font-size="22" fill="#d8bc63" letter-spacing="3">政策升格</text>
    <text x="130" y="910" font-size="38" font-weight="700" fill="#f6e8b5">"新兴支柱产业"</text>
    <text x="130" y="950" font-size="26" fill="#c6b9d4">政府工作报告首次独立条款</text>
    <line x1="130" y1="990" x2="470" y2="990" stroke="#5e4c75"/>
    <text x="130" y="1030" font-size="26" fill="#b8a9c8">商业航天司设立</text>
    <text x="130" y="1065" font-size="26" fill="#b8a9c8">科创板第五套标准适用</text>

    <!-- Card 4: 全球估值重定价 (expanded height to fit overflow text) -->
    <rect x="570" y="780" width="420" height="320" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="610" y="840" font-size="22" fill="#d8bc63" letter-spacing="3">全球估值重定价</text>
    <text x="610" y="910" font-size="38" font-weight="700" fill="#f6e8b5">SpaceX上市+19%</text>
    <text x="610" y="950" font-size="26" fill="#c6b9d4">PS约95倍，市值全球前六</text>
    <line x1="610" y1="990" x2="950" y2="990" stroke="#5e4c75"/>
    <text x="610" y="1030" font-size="26" fill="#b8a9c8">Starlink已实现盈利</text>
    <text x="610" y="1066" font-size="26" fill="#b8a9c8">国内同行落后3-5年</text>

    <rect x="90" y="1220" width="900" height="90" rx="18" fill="#d8bc63" fill-opacity="0.1" stroke="#d8bc63" stroke-opacity="0.35"/>
    <text x="540" y="1275" text-anchor="middle" font-size="28" fill="#e8d696">产业方向真实且不可逆，但A股纯正标的仍缺失</text>
  </g>
  <text x="90" y="1400" font-family="'Times New Roman', serif" font-size="20" font-weight="700" fill="#d8bc63" letter-spacing="4">CIRCE</text>
  <text x="990" y="1400" text-anchor="end" font-family="'PingFang SC', sans-serif" font-size="16" fill="#6f627e">资料整理 · 2026.06</text>
</svg>