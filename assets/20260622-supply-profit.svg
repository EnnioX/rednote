<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070611"/><stop offset="0.55" stop-color="#120a25"/><stop offset="1" stop-color="#090713"/></linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9d7930"/><stop offset="0.5" stop-color="#f2df91"/><stop offset="1" stop-color="#9d7930"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#c9a84c"/></marker>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <text x="90" y="112" font-family="'PingFang SC', sans-serif" font-size="24" fill="#8f80a5" letter-spacing="5">02 / SUPPLY TO PROFIT</text>
  <text x="90" y="220" font-family="'PingFang SC', sans-serif" font-size="66" font-weight="700" fill="#f1df91">产业供需与盈利传导</text>
  <rect x="90" y="266" width="150" height="4" rx="2" fill="url(#flow)"/>
  <text x="90" y="325" font-family="'PingFang SC', sans-serif" font-size="27" fill="#a99abb">光模块从800G→1.6T→3.2T，每代通道数翻倍、InP消耗量2.7倍增长</text>

  <g font-family="'PingFang SC', sans-serif" text-anchor="middle">
    <rect x="170" y="380" width="740" height="100" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="420" font-size="22" fill="#d8bc63" letter-spacing="3">需求起点</text>
    <text x="540" y="458" font-size="32" font-weight="600" fill="#f5e8b0">AI算力集群扩展→光互联带宽指数增长</text>
    <line x1="540" y1="495" x2="540" y2="530" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="545" width="360" height="160" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="350" y="585" font-size="20" fill="#d8bc63" letter-spacing="3">铟原料约束</text>
    <text x="350" y="625" font-size="28" font-weight="600" fill="#f5e8b0">中国出口管制+高纯铟壁垒</text>
    <text x="350" y="665" font-size="22" fill="#a99abb">铟价+76%→衬底成本上升</text>
    <text x="350" y="695" font-size="22" fill="#a99abb">出口锁定年产30%</text>

    <rect x="550" y="545" width="360" height="160" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="730" y="585" font-size="20" fill="#d8bc63" letter-spacing="3">扩产刚性约束</text>
    <text x="730" y="625" font-size="28" font-weight="600" fill="#f5e8b0">扩产→有效产能≥2年</text>
    <text x="730" y="665" font-size="22" fill="#a99abb">MOCVD交付7–12月</text>
    <text x="730" y="695" font-size="22" fill="#a99abb">良率爬坡8–12月+认证12–24月</text>

    <line x1="350" y1="720" x2="350" y2="755" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="730" y1="720" x2="730" y2="755" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="770" width="740" height="100" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="810" font-size="22" fill="#d8bc63" letter-spacing="3">供给刚性</text>
    <text x="540" y="848" font-size="32" font-weight="600" fill="#f5e8b0">三寡头垄断(CR3&gt;90%)→定价权稳固</text>
    <line x1="540" y1="885" x2="540" y2="920" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="935" width="740" height="100" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="975" font-size="22" fill="#d8bc63" letter-spacing="3">盈利兑现路径</text>
    <text x="540" y="1013" font-size="32" font-weight="600" fill="#f5e8b0">衬底涨价→海外龙头先受益→A股标的弹性有限</text>
    <line x1="540" y1="1050" x2="540" y2="1085" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="1100" width="740" height="70" rx="28" fill="#d8bc63" fill-opacity="0.11" stroke="#d8bc63"/>
    <text x="540" y="1140" font-size="22" fill="#d8bc63" letter-spacing="3">核心瓶颈：A股标的InP收入占比均&lt;15%，产业景气→个股盈利传导链断裂</text>
  </g>

  <text x="90" y="1260" font-family="'PingFang SC', sans-serif" font-size="22" fill="#d8bc63" letter-spacing="3">验证指标</text>
  <g font-family="'PingFang SC', sans-serif" font-size="22">
    <rect x="90" y="1285" width="280" height="85" rx="16" fill="#1a3025" stroke="#6ba87e"/>
    <text x="230" y="1318" text-anchor="middle" fill="#8dcaa0">中报化合物半导体</text>
    <text x="230" y="1348" text-anchor="middle" fill="#8dcaa0">营收增速&gt;50%</text>

    <rect x="390" y="1285" width="280" height="85" rx="16" fill="#1a3025" stroke="#6ba87e"/>
    <text x="530" y="1318" text-anchor="middle" fill="#8dcaa0">200G EML</text>
    <text x="530" y="1348" text-anchor="middle" fill="#8dcaa0">通过客户认证</text>

    <rect x="690" y="1285" width="280" height="85" rx="16" fill="#2a1525" stroke="#a84f58"/>
    <text x="830" y="1318" text-anchor="middle" fill="#d8949d">失效：营收增速</text>
    <text x="830" y="1348" text-anchor="middle" fill="#d8949d">&lt;20%或管制放宽</text>
  </g>
</svg>
