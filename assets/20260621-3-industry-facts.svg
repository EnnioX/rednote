    <rect x="570" y="815" width="420" height="260" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="610" y="875" font-size="22" fill="#d8bc63" letter-spacing="3">龙头在手订单</text>
    <text x="610" y="945" font-size="34" font-weight="700" fill="#f6e8b5">排产至2027年Q1</text>
    <text x="610" y="985" font-size="26" fill="#c6b9d4">北方华创650亿+</text>
    <line x1="610" y1="1020" x2="950" y2="1020" stroke="#5e4c75"/>
    <text x="610" y="1055" font-size="26" fill="#b8a9c8">四家龙头合计营收~429亿</text>

    <rect x="90" y="1220" width="900" height="90" rx="18" fill="#d8bc63" fill-opacity="0.1" stroke="#d8bc63" stroke-opacity="0.35"/>
    <text x="540" y="1275" text-anchor="middle" font-size="28" fill="#e8d696">三重共振不可逆，板块估值已计入较多乐观预期</text>
  </g>
  <text x="90" y="1400" font-family="'Times New Roman', serif" font-size="20" font-weight="700" fill="#d8bc63" letter-spacing="4">CIRCE</text>
  <text x="990" y="1400" text-anchor="end" font-family="'PingFang SC', sans-serif" font-size="16" fill="#6f627e">资料整理 · 2026.06</text>
