<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070611"/><stop offset="0.55" stop-color="#120a25"/><stop offset="1" stop-color="#090713"/></linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9d7930"/><stop offset="0.5" stop-color="#f2df91"/><stop offset="1" stop-color="#9d7930"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#c9a84c"/></marker>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <text x="90" y="112" font-family="'PingFang SC', sans-serif" font-size="24" fill="#8f80a5" letter-spacing="5">02 / SUPPLY TO PROFIT</text>
  <text x="90" y="220" font-family="'PingFang SC', sans-serif" font-size="68" font-weight="700" fill="#f1df91">供需与盈利传导</text>
  <rect x="90" y="266" width="150" height="4" rx="2" fill="url(#flow)"/>
  <text x="90" y="325" font-family="'PingFang SC', sans-serif" font-size="27" fill="#a99abb">从AI算力需求到电子布涨价，再到国内厂商放量</text>

  <g font-family="'PingFang SC', sans-serif" text-anchor="middle">
    <rect x="170" y="390" width="740" height="130" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="442" font-size="22" fill="#d8bc63" letter-spacing="3">需求起点</text>
    <text x="540" y="490" font-size="30" font-weight="600" fill="#f5e8b0">AI算力扩张 → PCB高端化 → 电子布用量3-5倍</text>
    <line x1="540" y1="535" x2="540" y2="575" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="590" width="740" height="130" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="642" font-size="22" fill="#d8bc63" letter-spacing="3">供给约束</text>
    <text x="540" y="690" font-size="30" font-weight="600" fill="#f5e8b0">织布机交付18-24月 + 铂铑涨价抑制扩产</text>
    <line x1="540" y1="735" x2="540" y2="775" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="790" width="740" height="130" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="842" font-size="22" fill="#d8bc63" letter-spacing="3">价格传导</text>
    <text x="540" y="890" font-size="30" font-weight="600" fill="#f5e8b0">供给缺口 → 年内5轮提价 → 均价翻倍</text>
    <line x1="540" y1="935" x2="540" y2="975" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="990" width="740" height="190" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="1042" font-size="22" fill="#d8bc63" letter-spacing="3">盈利兑现</text>
    <text x="540" y="1095" font-size="30" font-weight="600" fill="#f5e8b0">宏和科技：Q1净利+354%，毛利率55.7%</text>
    <text x="540" y="1145" font-size="30" font-weight="600" fill="#f5e8b0">国际复材：Q1净利+413%，满产满销</text>
    <line x1="540" y1="1200" x2="540" y2="1240" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="1260" width="740" height="80" rx="28" fill="#d8bc63" fill-opacity="0.11" stroke="#d8bc63"/>
    <text x="540" y="1310" font-size="28" font-weight="600" fill="#f5e8b0">涨价弹性已兑现，但供给约束持续至2027年</text>
  </g>

  <text x="90" y="1360" font-family="'PingFang SC', sans-serif" font-size="22" fill="#d8bc63" letter-spacing="3">当前风险</text>
  <g font-family="'PingFang SC', sans-serif" font-size="20">
    <rect x="90" y="1385" width="280" height="45" rx="16" fill="#2a1525" stroke="#8e4f58"/><text x="230" y="1414" text-anchor="middle" fill="#dfb4b9">宏和PE极高需甄别真假AI</text>
    <rect x="400" y="1385" width="280" height="45" rx="16" fill="#2a1525" stroke="#8e4f58"/><text x="540" y="1414" text-anchor="middle" fill="#dfb4b9">巨石电子布占比仅~20%</text>
    <rect x="710" y="1385" width="280" height="45" rx="16" fill="#2a1525" stroke="#8e4f58"/><text x="850" y="1414" text-anchor="middle" fill="#dfb4b9">新产能2027年或过剩</text>
  </g>
</svg>
