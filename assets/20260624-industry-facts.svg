  <rect x="90" y="1260" width="900" height="90" rx="18" fill="#d8bc63" fill-opacity="0.1" stroke="#d8bc63" stroke-opacity="0.35"/>
  <text x="540" y="1316" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="28" fill="#e8d696">高端织布机交付周期是当前最刚的供给约束</text>
