    <text x="130" y="1160" font-size="26" fill="#b8a9c8">高端与消费级粉价格分化</text>
    <text x="130" y="1195" font-size="26" fill="#b8a9c8">涨价含部分渠道囤货（瑞银）</text>

    <!-- Card 4: 国产替代破局 (split long lines) -->
    <rect x="570" y="850" width="420" height="390" rx="28" fill="#171027" stroke="#7d6330" stroke-opacity="0.65"/>
    <text x="610" y="910" font-size="22" fill="#d8bc63" letter-spacing="3">国产替代破局</text>
    <text x="610" y="985" font-size="46" font-weight="700" fill="#f6e8b5">国瓷市占80%+</text>
    <text x="610" y="1025" font-size="26" fill="#c6b9d4">国内唯一规模量产高端粉体</text>
    <line x1="610" y1="1070" x2="950" y2="1070" stroke="#5e4c75"/>
    <text x="610" y="1120" font-size="26" fill="#b8a9c8">订单排期已达4-6个月</text>
    <text x="610" y="1160" font-size="26" fill="#b8a9c8">三星电机Q3批量出货确认</text>
    <text x="610" y="1200" font-size="26" fill="#b8a9c8">三环粉体100%自给</text>
    <text x="610" y="1235" font-size="26" fill="#b8a9c8">成本比外购低20-30%</text>
