<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070611"/><stop offset="0.55" stop-color="#120a25"/><stop offset="1" stop-color="#090713"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#b58c38"/><stop offset="0.5" stop-color="#f2df91"/><stop offset="1" stop-color="#b58c38"/></linearGradient>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <circle cx="80" cy="1340" r="230" fill="none" stroke="#d8bc63" stroke-opacity="0.06"/>
  <text x="90" y="112" font-family="'PingFang SC', sans-serif" font-size="24" fill="#8f80a5" letter-spacing="5">01 / INDUSTRY FACTS</text>
  <text x="90" y="220" font-family="'PingFang SC', sans-serif" font-size="72" font-weight="700" fill="#f1df91">已确认的产业事实</text>
  <rect x="90" y="266" width="150" height="4" rx="2" fill="url(#gold)"/>
  <text x="90" y="325" font-family="'PingFang SC', sans-serif" font-size="27" fill="#a99abb">AI驱动MLCC高端粉体从紧平衡走向系统性缺口</text>

  <g font-family="'PingFang SC', sans-serif">
    <!-- Card 1: AI驱动MLCC升级 -->
    <rect x="90" y="390" width="420" height="400" rx="28" fill="#171027" stroke="#7d6330" stroke-opacity="0.65"/>
    <text x="130" y="450" font-size="22" fill="#d8bc63" letter-spacing="3">AI驱动MLCC升级</text>
    <text x="130" y="530" font-size="46" font-weight="700" fill="#f6e8b5">14倍用量跃升</text>
    <text x="130" y="575" font-size="26" fill="#c6b9d4">单台MLCC用量暴增14倍</text>
    <line x1="130" y1="620" x2="470" y2="620" stroke="#5e4c75"/>
    <text x="130" y="665" font-size="26" fill="#b8a9c8">高端粉体需求CAGR 53.4%</text>
    <text x="130" y="705" font-size="26" fill="#b8a9c8">2029年出现系统性供给缺口</text>
    <text x="130" y="745" font-size="26" fill="#b8a9c8">2030年缺口扩大至1.3万吨</text>

    <!-- Card 2: 供给高度集中 (split long lines) -->
    <rect x="570" y="390" width="420" height="420" rx="28" fill="#171027" stroke="#7d6330" stroke-opacity="0.65"/>
    <text x="610" y="450" font-size="22" fill="#d8bc63" letter-spacing="3">供给高度集中</text>
