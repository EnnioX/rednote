  <rect x="90" y="1310" width="900" height="90" rx="18" fill="#d8bc63" fill-opacity="0.1" stroke="#d8bc63" stroke-opacity="0.35"/>
  <text x="540" y="1366" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="28" fill="#e8d696">稀土管制是结构性变量，而非周期性波动</text>
  <text x="90" y="1410" font-family="'Times New Roman', serif" font-size="20" font-weight="700" fill="#d8bc63" letter-spacing="4">CIRCE</text>
  <text x="990" y="1410" text-anchor="end" font-family="'PingFang SC', sans-serif" font-size="16" fill="#6f627e">资料整理 · 2026.06</text>
</svg>
