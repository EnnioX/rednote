    <text x="610" y="610" font-size="26" fill="#c6b9d4">仅5,000-6,000吨</text>
    <line x1="610" y1="650" x2="950" y2="650" stroke="#5e4c75"/>
    <text x="610" y="700" font-size="26" fill="#b8a9c8">堺化学·日本化学·富士钛等</text>
    <text x="610" y="740" font-size="26" fill="#b8a9c8">稀土管制阻断日系关键原料</text>
    <text x="610" y="780" font-size="26" fill="#b8a9c8">海外扩产至少需2-3年</text>

    <!-- Card 3: 涨价已在兑现 -->
