<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070611"/><stop offset="0.55" stop-color="#120a25"/><stop offset="1" stop-color="#090713"/></linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9d7930"/><stop offset="0.5" stop-color="#f2df91"/><stop offset="1" stop-color="#9d7930"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#c9a84c"/></marker>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <text x="90" y="112" font-family="'PingFang SC', sans-serif" font-size="24" fill="#8f80a5" letter-spacing="5">02 / SUPPLY TO PROFIT</text>
  <text x="90" y="220" font-family="'PingFang SC', sans-serif" font-size="68" font-weight="700" fill="#f1df91">供需与盈利传导</text>
  <rect x="90" y="266" width="150" height="4" rx="2" fill="url(#flow)"/>
  <text x="90" y="325" font-family="'PingFang SC', sans-serif" font-size="27" fill="#a99abb">从AI算力需求到粉体涨价，再到国产厂商量价齐升</text>

  <g font-family="'PingFang SC', sans-serif" text-anchor="middle">
    <rect x="170" y="390" width="740" height="130" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="442" font-size="22" fill="#d8bc63" letter-spacing="3">需求起点</text>
    <text x="540" y="490" font-size="30" font-weight="600" fill="#f5e8b0">AI算力扩张 → 服务器MLCC需求暴增14倍</text>
    <line x1="540" y1="535" x2="540" y2="575" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="590" width="740" height="130" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="642" font-size="22" fill="#d8bc63" letter-spacing="3">供给约束</text>
    <text x="540" y="690" font-size="30" font-weight="600" fill="#f5e8b0">高端粉体供给刚性（技术壁垒+稀土管制）</text>
    <line x1="540" y1="735" x2="540" y2="775" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Price conduction: split long line into 2 -->
    <rect x="170" y="790" width="740" height="150" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="842" font-size="22" fill="#d8bc63" letter-spacing="3">价格传导</text>
    <text x="540" y="890" font-size="30" font-weight="600" fill="#f5e8b0">供需缺口 → 高端粉体涨价20-30%</text>
    <text x="540" y="925" font-size="30" font-weight="600" fill="#f5e8b0">→ MLCC涨价15-35%</text>
    <line x1="540" y1="955" x2="540" y2="990" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="1010" width="740" height="190" rx="28" fill="#1a112c" stroke="#8e7137"/>
    <text x="540" y="1062" font-size="22" fill="#d8bc63" letter-spacing="3">盈利兑现</text>
    <text x="540" y="1115" font-size="30" font-weight="600" fill="#f5e8b0">国瓷材料：国内市占80-85%</text>
    <text x="540" y="1165" font-size="30" font-weight="600" fill="#f5e8b0">三环集团：粉体100%自给</text>
    <line x1="540" y1="1215" x2="540" y2="1250" stroke="#c9a84c" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="170" y="1280" width="740" height="80" rx="28" fill="#d8bc63" fill-opacity="0.11" stroke="#d8bc63"/>
    <text x="540" y="1330" font-size="28" font-weight="600" fill="#f5e8b0">结构性供需缺口，涨价弹性尚未完全释放</text>
  </g>

  <text x="90" y="1385" font-family="'PingFang SC', sans-serif" font-size="22" fill="#d8bc63" letter-spacing="3">当前瓶颈</text>
  <g font-family="'PingFang SC', sans-serif" font-size="20">
    <rect x="90" y="1405" width="280" height="45" rx="16" fill="#2a1525" stroke="#8e4f58"/><text x="230" y="1434" text-anchor="middle" fill="#dfb4b9">日系原料受限扩产需2-3年</text>
    <rect x="400" y="1405" width="280" height="45" rx="16" fill="#2a1525" stroke="#8e4f58"/><text x="540" y="1434" text-anchor="middle" fill="#dfb4b9">高端粉体良率仅~80%</text>
    <rect x="710" y="1405" width="280" height="45" rx="16" fill="#2a1525" stroke="#8e4f58"/><text x="850" y="1434" text-anchor="middle" fill="#dfb4b9">标的PE 90-145x偏高</text>
  </g>
</svg>
