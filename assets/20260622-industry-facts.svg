<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070611"/><stop offset="0.55" stop-color="#120a25"/><stop offset="1" stop-color="#090713"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#b58c38"/><stop offset="0.5" stop-color="#f2df91"/><stop offset="1" stop-color="#b58c38"/></linearGradient>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <circle cx="80" cy="1340" r="230" fill="none" stroke="#d8bc63" stroke-opacity="0.06"/>
  <text x="90" y="112" font-family="'PingFang SC', sans-serif" font-size="24" fill="#8f80a5" letter-spacing="5">01 / INDUSTRY FACTS</text>
  <text x="90" y="220" font-family="'PingFang SC', sans-serif" font-size="68" font-weight="700" fill="#f1df91">已确认的产业事实</text>
  <rect x="90" y="266" width="150" height="4" rx="2" fill="url(#gold)"/>
  <text x="90" y="325" font-family="'PingFang SC', sans-serif" font-size="27" fill="#a99abb">60GWh超级订单落地·全球储能+40%·钠电GWh级交付元年·成本逼近平价</text>

  <g font-family="'PingFang SC', sans-serif">
    <!-- Card 1: 60GWh超级订单 -->
    <rect x="90" y="390" width="420" height="380" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="130" y="450" font-size="22" fill="#d8bc63" letter-spacing="3">60GWh超级订单</text>
    <text x="130" y="525" font-size="34" font-weight="700" fill="#f6e8b5">宁德时代×海博思创</text>
    <text x="130" y="565" font-size="26" fill="#c6b9d4">3年供货协议签署</text>
    <line x1="130" y1="600" x2="470" y2="600" stroke="#5e4c75"/>
    <text x="130" y="640" font-size="26" fill="#b8a9c8">全球迄今最大钠电订单</text>
    <text x="130" y="680" font-size="26" fill="#b8a9c8">2026Q3首批系统交付</text>
    <text x="130" y="720" font-size="26" fill="#b8a9c8">福鼎40GWh产线扩建中</text>

    <!-- Card 2: 全球储能+40% -->
    <rect x="570" y="390" width="420" height="380" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="610" y="450" font-size="22" fill="#d8bc63" letter-spacing="3">全球储能需求+40%</text>
    <text x="610" y="525" font-size="34" font-weight="700" fill="#f6e8b5">2026年455GWh</text>
    <text x="610" y="565" font-size="26" fill="#c6b9d4">中欧美三极共振</text>
    <line x1="610" y1="600" x2="950" y2="600" stroke="#5e4c75"/>
    <text x="610" y="640" font-size="26" fill="#b8a9c8">中国254GWh(+65%)</text>
    <text x="610" y="680" font-size="26" fill="#b8a9c8">美国63GWh·AI数据中心配储</text>
    <text x="610" y="720" font-size="26" fill="#b8a9c8">欧洲50GWh·大储替代燃气</text>

    <!-- Card 3: 产品性能 -->
    <rect x="90" y="815" width="420" height="300" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="130" y="875" font-size="22" fill="#d8bc63" letter-spacing="3">产品性能已达标</text>
    <text x="130" y="945" font-size="34" font-weight="700" fill="#f6e8b5">循环15,000次</text>
    <text x="130" y="985" font-size="26" fill="#c6b9d4">磷酸铁锂仅3,000-6,000次</text>
    <line x1="130" y1="1020" x2="470" y2="1020" stroke="#5e4c75"/>
    <text x="130" y="1060" font-size="26" fill="#b8a9c8">单体容量300+Ah</text>
    <text x="130" y="1098" font-size="26" fill="#b8a9c8">温域-40~70℃</text>

    <!-- Card 4: 成本逼近平价 -->
    <rect x="570" y="815" width="420" height="300" rx="28" fill="#1a112c" stroke="#8e7137" stroke-opacity="0.65"/>
    <text x="610" y="875" font-size="22" fill="#d8bc63" letter-spacing="3">成本逼近平价</text>
    <text x="610" y="945" font-size="34" font-weight="700" fill="#f6e8b5">0.35-0.40元/Wh</text>
    <text x="610" y="985" font-size="26" fill="#c6b9d4">临近磷酸铁锂平价点</text>
    <line x1="610" y1="1020" x2="950" y2="1020" stroke="#5e4c75"/>
    <text x="610" y="1060" font-size="26" fill="#b8a9c8">2027年成本优势正式确立</text>

    <rect x="90" y="1220" width="900" height="90" rx="18" fill="#d8bc63" fill-opacity="0.1" stroke="#d8bc63" stroke-opacity="0.35"/>
    <text x="540" y="1275" text-anchor="middle" font-size="28" fill="#e8d696">钠电26.8GWh仅占全球储能电芯3.3%，仍是边缘补充</text>
  </g>
  <text x="90" y="1400" font-family="'Times New Roman', serif" font-size="20" font-weight="700" fill="#d8bc63" letter-spacing="4">CIRCE</text>
  <text x="990" y="1400" text-anchor="end" font-family="'PingFang SC', sans-serif" font-size="16" fill="#6f627e">资料整理 · 2026.06</text>
</svg>
