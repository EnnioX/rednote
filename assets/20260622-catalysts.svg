    <text x="320" y="1004" font-size="24" fill="#a99abb">验证：绿电占比要求、补贴力度</text>

    <circle cx="250" cy="1150" r="14" fill="#f2df91"/><circle cx="250" cy="1150" r="28" fill="none" stroke="#d8bc63" stroke-opacity="0.35"/>
